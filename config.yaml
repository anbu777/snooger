# ═══════════════════════════════════════════════════════════
# Snooger v3.0 — Professional Penetration Testing Framework
# Configuration File
# ═══════════════════════════════════════════════════════════

tools:
  # Reconnaissance
  subfinder: "subfinder"
  amass: "amass"
  assetfinder: "assetfinder"
  dnsx: "dnsx"
  httpx: "httpx"
  massdns: "massdns"
  # Scanning
  nuclei: "nuclei"
  nmap: "nmap"
  masscan: "masscan"
  testssl: "testssl"
  # Fuzzing
  ffuf: "ffuf"
  gobuster: "gobuster"
  dirsearch: "dirsearch"
  arjun: "arjun"
  # Exploitation
  sqlmap: "sqlmap"
  xsstrike: "xsstrike"
  commix: "commix"
  # Takeover
  subjack: "subjack"
  subzy: "subzy"
  # Historical
  gau: "gau"
  waybackurls: "waybackurls"
  # CMS
  wpscan: "wpscan"
  # OOB
  interactsh_client: "interactsh-client"
  # General
  curl: "curl"
  git: "git"
  jq: "jq"

ai:
  mode: "auto"  # List of primary and fallback providers, in order of preference.
  # Available: deepseek, groq, openai, anthropic, gemini, ollama
  providers: ["deepseek", "groq"]  # try in order if primary fails
  ollama:
    model_smart: "llama3.2"
    model_light: "tinyllama"
    host: "http://localhost:11434"
    timeout: 120
  groq:
    api_key: "ENV:GROQ_API_KEY" # Reads from environment variable
    model: "llama3-70b-8192"
    system_prompt: |
      You are an elite autonomous penetration tester and expert bug hunter.
      Provide highly accurate, actionable, and safe analysis. Focus on real impact.
    timeout: 30
  deepseek:
    api_key: "ENV:DEEPSEEK_API_KEY" # Reads from environment variable
    model: "deepseek-coder"
    system_prompt: |
      You are an elite autonomous penetration tester and expert bug hunter.
      Provide highly accurate, actionable, and safe analysis. Focus on real impact.
    timeout: 30

rate_limit:
  requests_per_second: 10
  delay_between_phases: 2
  adaptive_delay: true
  max_retries: 3
  backoff_factor: 2.0

stealth:
  use_fake_useragent: true
  rotate_useragent: true
  random_delay_min: 0.3
  random_delay_max: 1.5
  jitter: true

proxy:
  enabled: false
  http: ""
  https: ""
  socks5: ""
  rotate: false
  proxy_list: ""

interactsh:
  server: "oast.pro"
  token: "${INTERACTSH_TOKEN}"
  enabled: false

notifications:
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    min_severity: "high"
  discord:
    enabled: false
    webhook_url: "${DISCORD_WEBHOOK_URL}"
    min_severity: "high"
  webhook:
    enabled: false
    url: "${CUSTOM_WEBHOOK_URL}"
    min_severity: "critical"

platform:
  hackerone:
    api_username: "${HACKERONE_API_USERNAME}"
    api_token: "${HACKERONE_API_TOKEN}"
    auto_submit: false
    draft_mode: true
  bugcrowd:
    api_token: "${BUGCROWD_API_TOKEN}"
    auto_submit: false
    draft_mode: true

async:
  max_concurrent_scans: 20
  max_concurrent_requests: 50
  thread_pool_size: 10

plugins:
  enabled: true
  directory: "plugins"
  autoload: true

seclists:
  auto_download: true
  path: "/usr/share/seclists"
  fallback_path: "/opt/seclists"

workspace: "workspace"

profiles:
  quick:
    nuclei_severity: "critical,high"
    ffuf_threads: 20
    ffuf_delay: 1.0
    max_subdomains: 50
    max_crawl_pages: 100
    skip_post: true
    async_concurrent: 30
  stealth:
    nuclei_severity: "critical,high,medium"
    ffuf_threads: 5
    ffuf_delay: 3.0
    max_subdomains: 100
    max_crawl_pages: 200
    skip_post: true
    async_concurrent: 5
    requests_per_second: 2
  thorough:
    nuclei_severity: "critical,high,medium,low"
    ffuf_threads: 30
    ffuf_delay: 0.3
    max_subdomains: 500
    max_crawl_pages: 500
    skip_post: false
    async_concurrent: 50
  aggressive:
    nuclei_severity: "critical,high,medium,low,info"
    ffuf_threads: 40
    ffuf_delay: 0.1
    max_subdomains: 1000
    max_crawl_pages: 1000
    skip_post: false
    async_concurrent: 100
    ai_priority: "smart"
